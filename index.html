<title>AEP Knowledge Base</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  color-scheme: dark;
  --bg: #080b12;
  --surface: #0d1117;
  --surface2: #111827;
  --border: #1e2535;
  --border2: #2a3450;
  --text: #e2e8f0;
  --muted: #64748b;
  --dim: #374151;
  --accent: #818cf8;
  --accent-soft: #a5b4fc;
  --accent-bg: rgba(129,140,248,0.08);
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.1);
  --amber: #fcd34d;
  --amber-bg: rgba(252,211,77,0.07);
  --sidebar-w: 258px;
  --nav-h: 56px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

#app { display: flex; flex-direction: column; height: 100vh; }

/* ── TOP NAV ──────────────────────────────────────────── */
#topnav {
  height: var(--nav-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 14px;
  flex-shrink: 0;
  z-index: 10;
}

.logo {
  display: flex; align-items: center; gap: 9px;
  font-size: 13.5px; font-weight: 600; color: var(--text);
  cursor: pointer; white-space: nowrap; text-decoration: none;
  flex-shrink: 0;
}
.logo-icon {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff;
  letter-spacing: -0.5px;
  box-shadow: 0 0 12px rgba(124,58,237,0.35);
}
.logo-sub { color: var(--muted); font-weight: 400; }

#search-wrap {
  flex: 1; max-width: 420px; position: relative; margin: 0 auto;
}
.search-icon-el {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--dim); pointer-events: none;
}
#search {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 7px 38px 7px 34px;
  color: var(--text);
  font-size: 13.5px; font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(129,140,248,0.12);
}
#search::placeholder { color: var(--dim); }
.search-kbd {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  font-size: 10px; color: var(--dim); background: var(--surface);
  border: 1px solid var(--border2); border-radius: 4px;
  padding: 1px 5px; pointer-events: none;
}

.nav-pills { display: flex; gap: 3px; margin-left: auto; flex-shrink: 0; }
.nav-pill {
  font-size: 12.5px; color: var(--muted);
  padding: 5px 11px; border-radius: 7px;
  cursor: pointer; transition: background 0.15s, color 0.15s;
  border: 1px solid transparent;
}
.nav-pill:hover { background: var(--surface2); color: var(--text); }
.nav-pill.active {
  background: var(--accent-bg); color: var(--accent-soft);
  border-color: rgba(129,140,248,0.2);
}

/* ── LAYOUT ───────────────────────────────────────────── */
#layout { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ──────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}
#sidebar-scroll { flex: 1; overflow-y: auto; padding: 14px 0; }

.sb-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--dim);
  padding: 2px 16px 8px;
}
.sb-item {
  display: flex; align-items: center; gap: 9px;

  border-left: 2px solid transparent;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  color: var(--muted); font-size: 13px;
}
.sb-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }

.card-title { font-size: 13.5px; font-weight: 600; color: var(--text); line-height: 1.3; }

/* ── ARTICLE PAGE ─────────────────────────────────────── */

const ARTICLES = [
  {
    id: 'xdm-schemas',
    title: 'XDM Schemas',
    status: 'established',
    updated: '2026-05-26',
    sources: ['xdm-system-overview-adobe', 'aep-xdm-schema-best-practices'],
    related: ['customer-journey-analytics','web-sdk-implementation','real-time-customer-profile','segmentation-and-audiences','datastreams-and-edge-network'],
    blurb: 'The XDM data model — schemas, classes, field groups, the three data behaviours, and practitioner design rules.',
    summary: `Experience Data Model (XDM) is Adobe's open specification for describing customer experience data, and XDM System is how that spec gets operationalised inside Experience Platform. Every piece of data has to conform to a schema before it can land in the platform, and each schema is built from one base class plus zero or more field groups. The class decides the schema's data behaviour — record or time-series — which in turn decides how every downstream service treats the data.`,
    body: `## The building blocks

A schema is the contract. Before anything can be ingested, you compose a schema that describes the structure of the incoming data and constrains what each field can hold. The platform is schema-agnostic: any schema that conforms to XDM is available to every Platform service, so the schema you design propagates through Catalog, Query Service, Profile, and segmentation.

Schemas are assembled from two building blocks. A **base class** establishes the smallest set of properties a schema needs to represent a particular behaviour, and **field groups** add reusable sets of fields on top. Adobe ships a large library of standard field groups and data types covering common cross-industry concepts, and the UI surfaces a popularity metric on each field group to steer modelling decisions.

The class assignment matters more than anything else, because it locks in the data behaviour. XDM sorts data into three behaviours:

- **Record** — attributes of a subject (a person or an organisation). Who someone is.
- **Time-series** — a snapshot of the system when an action happened. What happened, and when.
- **Ad-hoc** — fields namespaced to a single dataset, generated automatically by ingestion workflows like CSV uploads.

**XDM Individual Profile** is the record class — a single representation of a subject's attributes that works across the full identity spectrum, from an anonymous cookie to a fully identified person. **XDM ExperienceEvent** is the time-series class — an immutable, factual record of what occurred at a point in time. Events can be explicit (a directly observable action, like a click) or implicit (raised without human action, like a newsletter send). Because events are immutable and timestamped, they power time-domain analysis across windows.

Once a schema exists, a **dataset** references it and becomes the thing data is actually ingested into. Datasets are tracked by Catalog Service and stored in the data lake. The connection to Profile runs through a tag: when you enable a schema for Real-Time Customer Profile and mark it for the **union schema** — the aggregate of every schema implementing the same class — it feeds the profile store.

One newer wrinkle: **relational schemas** (via Data Mirror) break the usual class-plus-field-group model. They're built for relational-style data, enforce primary/foreign keys, and are optimised for change-data-capture ingestion from Snowflake, Databricks, or BigQuery. They don't use classes or field groups at all. Availability is gated.

## Design in practice

**Field groups are reusability units, scoped to a class.** Design them to be lifted from one schema into another — a "Product" field group should drop unchanged into both a web event schema and an in-store transaction schema. Field groups don't cross class boundaries, so prefix names with the class they belong to: \`Event - Product\`, \`Profile - Customer Attributes\`, \`Lookup - Product\`. In practice a field group maps onto a root object — "Product" lives at \`_tenant.product[]\`, "Identity" at \`_tenant.identity\`.

**Custom fields go in your tenant namespace.** Add custom fields to your own tenant, never into an Adobe-designed field group. Mixing custom fields into Adobe field groups fractures the schema.

**Model events as a string, not a field per event.** The anti-pattern is creating a new field for every event — \`_tenant.events.formSubmit\` typed as an integer. That forces a schema change for every new event. Instead, use the standard \`eventType\` field and pass a camelCase string like \`formSubmitSuccess\`. New events become new strings, never new fields. Downstream in CJA, you expose \`eventType\` as a metric pinned to the expected string via Include/Exclude Values.

**One schema and one dataset for web plus mobile.** Web and mobile are both digital behavioural data — they belong in a single shared schema and a single event-based dataset. CJA stitching only operates within a single event-based dataset, never across two. See [[customer-journey-analytics]] for the stitching consequence and [[web-sdk-implementation]] for the collection side.

**Carry both unit and total values.** For anything with a per-item and an aggregate form — price, discount — model both (\`unitPrice\` and \`totalPrice\`, \`unitDiscount\` and \`totalDiscount\`). Totals make CJA reporting straightforward; unit values matter when Event Forwarding hands a single value to a third party.`,

    title: 'Web SDK Implementation',
    status: 'emerging',

    sources: ['adobe-web-sdk-best-practices', 'aep-xdm-schema-best-practices'],
    related: ['datastreams-and-edge-network','xdm-schemas','customer-journey-analytics'],
    blurb: 'The client-side Web SDK — using the data object for AA migrations and why a SDK migration is not a CJA implementation.',
    summary: `The Adobe Web SDK (\`alloy.js\`, usually deployed through Tags) is the client-side library that collects data and sends it to the Edge Network. The recurring trap: treating "we moved to the Web SDK" as the same thing as "we're ready for CJA." It isn't. How you structure the payload — whether you send Analytics-shaped data or XDM — determines how much rework a future CJA implementation costs.`,
    body: `## Overview

The Web SDK replaces per-product JavaScript libraries with a single client that aggregates everything into one payload bound for a datastream. On the page you configure it and call its event commands; the routing and per-service handling happen server-side in the datastream. See [[datastreams-and-edge-network]] for that server-side half.

**Web SDK adoption and CJA readiness are different projects.** Implementing the Web SDK on its own does not prepare a company for CJA. The SDK is the collection mechanism for both, but the data you send for Adobe Analytics and the data CJA wants are shaped differently.

## Migrating Adobe Analytics: use the \`data\` object

When you move Adobe Analytics from AppMeasurement to the Web SDK, send your data through the SDK's \`data\` object — and do **not** build an AEP XDM schema for it. Data destined for Adobe Analytics still has to follow Analytics' own syntax and requirements, which are inherently different from an implementation designed for CJA. The \`data\` object is auto-mapped to Adobe Analytics by the datastream's Adobe Analytics service.

The alternatives are both worse. You could send the Adobe Analytics ExperienceEvent schema field group, but it preserves the props/eVars/events nomenclature, which CJA can't use. Or you could use AEP Data Prep to map custom schema fields onto Analytics fields — more moving parts, more to maintain. The \`data\` object is the most scalable and least complicated path.

**\`s.events\` and \`s.products\` still need custom code.** Even on the \`data\`-object path, the variables that used to be \`s.events\` and \`s.products\` require custom handling. The forward-looking CJA way to model product data is an array of objects, but Adobe Analytics has no concept of an array of objects — so you can't simply pass the CJA shape and have Analytics understand it. This is another concrete example of why a Web SDK migration is not, by itself, a step into CJA: the Analytics path and the XDM/CJA path diverge exactly where the richest data lives.

The implication for anyone planning both: decide early whether the engagement is an Analytics lift-and-shift or a genuine CJA build, because the payload design forks at the Web SDK. If CJA is the real destination, the schema-side design in [[xdm-schemas]] (the \`eventType\` string pattern, a shared web/mobile dataset, unit and total fields) is where readiness actually comes from.`,
    oq: [
      'The Tags extension mechanics — configure/sendEvent command surface, consent integration, and on-page debugging — aren\'t covered by an ingested source yet.',
      'The future array-of-objects product model for CJA is referenced but not specified — the XDM structure and data-layer contract behind it aren\'t sourced.'
    ]
  },
  {
    id: 'datastreams-and-edge-network',
    title: 'Datastreams and the Edge Network',
    status: 'emerging',
    updated: '2026-05-26',
    sources: ['datastreams-overview-adobe'],
    related: ['web-sdk-implementation','xdm-schemas','real-time-customer-profile'],
    blurb: 'Server-side config on the Edge Network that routes SDK data to Adobe apps and destinations, plus HIPAA/sensitive-data handling.',
    summary: `A datastream is the server-side configuration that tells the Edge Network where data collected by the Web and Mobile SDKs should go. It decouples routing from your site code: the SDK request carries a \`datastreamId\`, and the datastream decides which Adobe apps and downstream destinations receive the data. Change the routing without touching the page.`,
    body: `## How it works

The split between client and server is the whole point. The SDK's \`configure\` command handles client-side settings like \`edgeDomain\`; everything else — which products get the data, how it's mapped, where it's stored — is datastream configuration. When a request hits the Edge Network, the \`datastreamId\` in that request resolves to a datastream, and that controls the next hop. Because the configuration lives server-side, you can re-route or add a destination without a code deployment.

The **Edge Network** is a globally distributed network of servers built to receive and process data at scale. The practical payoff is consolidation: instead of dropping a separate library for each Adobe product on the page, you implement one SDK that aggregates everything into a single payload sent to one datastream. From there the datastream fans the data out to whatever you've configured — Adobe Analytics, Target, Audience Manager, Experience Platform — or to an event-forwarding property for third-party relay.

## Sensitive data and governance

Most of the current source concerns **sensitive data** handling, which matters for any client in a regulated space (especially health). Three mechanisms apply:

- **Audit logs.** Every create, update, or delete of a datastream produces an audit log recording who did what and when.

    summary: `Real-Time Customer Profile is the service that merges data scattered across channels, CRM, and third-party systems into one timestamped view of each customer. It does this by ingesting record and event data, stitching identities through Identity Service, and applying merge policies to resolve conflicts between fragments. The merged result is exposed as a union view and is what segmentation and every downstream Adobe app reads from.`,
    body: `## Fragments vs. merged profiles

The core distinction to hold onto is **fragments versus merged profiles**. A profile fragment is a single primary identity plus its record or event data within one dataset. A real customer almost always shows up as several fragments — one per dataset they appear in — and Profile merges those into a single view. Because of this, the fragment count in a system is always higher than the merged-profile count. Merging is not a one-time batch job; it's continuous as new data arrives.

When fragments disagree — one dataset says a customer is single, another says married — the **merge policy** decides which value wins. Merge policies are the rules for how conflicting data is prioritised and combined. You can create multiple policies, manage them through the API or UI, and set one as the organisation's default. They also govern identity stitching behaviour, which is where they intersect with Identity Service.

## Underlying stores

Profile sits on top of, but separate from, two other stores. The **Profile data store** (Azure Cosmos DB) holds the merged profile data. The **data lake** (Azure Data Lake storage) holds catalog data. The **identity graph** holds Identity Service's link data. Profile uses Identity Service to merge related fragments through identity mapping, but keeps its own copy of the resolved data rather than reaching into the graph at read time.

## Entity types

A profile is built from a **primary entity** — typically carrying an individual's traits, behaviours, and audience memberships — plus supporting entities. **Dimensional entities** (lookup/classification entities) simplify modelling for data shared across events or records. **B2B entities** describe relationships to accounts and opportunities.

The important constraint: **dimensional and B2B entities are batch-only** — available to batch segmentation only, not streaming. Both are linked to the primary entity through schema relationships. See [[segmentation-and-audiences]] for how this constrains evaluation methods.

## What feeds Profile

Only schemas explicitly enabled for Profile and tagged into the **union schema** participate. The union view is the merged picture of all of an entity's fragments across datasets.

Ingestion runs in two modes. **Streaming ingestion** carries real-time input; Profile runs streaming segmentation before merging data and updating the union view. **Batch ingestion** handles bulk loads. Updating existing profile data (correcting a record) is done through batch ingestion against a Profile-enabled dataset configured with an upsert tag.

    summary: `Segmentation Service turns Real-Time Customer Profile data into audiences — groups of people who share behaviours or characteristics. You describe the group with a segment definition (ultimately PQL under the hood), and Platform evaluates it through one of three methods: streaming, batch, or edge. The resulting audiences are maintained centrally and readable by any Adobe app, and audience membership is written back onto qualifying profiles.`,
    body: `## Core concepts

Three terms anchor everything. An **audience** is the collection of people. A **segment definition** is the rule set describing them. **Segmenting** (as a verb) is the act of separating profiles into audiences. An audience can be generated by Platform from a segment definition, or it can come from an external source — both are first-class.

There's more than one way to build one. The two common paths are a **segment definition** — built in the Segment Builder UI or via API — and **Audience Composition**, where you compose an audience directly. Whichever path you take, the definition compiles down to **Profile Query Language (PQL)**, the language built to retrieve profiles matching the criteria.

Two further options exist for enterprise data: **Federated Audience Composition** builds or enriches audiences from a data warehouse without copying the underlying data, and Data Distiller is available as another route.

## Evaluation methods

The evaluation method is the decision with the most operational weight, because it sets latency and freshness:

- **Streaming segmentation** — ongoing evaluation. Once saved, the definition runs against data as it flows into Profile. Additions and removals are processed continuously so the audience stays current.
- **Batch segmentation** — moves all profile data through the definitions at once. Batch audiences re-evaluate automatically every 24 hours; a segment job triggers an on-demand run.

**Data view components need stable, custom IDs.** In CJA you build data views and define their components — metrics and dimensions — on top of your data. Each component should be configured with a custom, camelCase component ID rather than an auto-generated one. When an analyst builds a Workspace project and then switches it to a different data view, the components only keep working if their IDs are stable and consistent across those data views. Default or inconsistent IDs break that cross-data-view behaviour.

## Stitching is a dataset-design decision

## \`eventType\` becomes a CJA metric

function inline(text) {
  // [[slug]] and [[slug|label]]
  text = text.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, slug, label) => {
    const id = slug.trim();
    const lbl = (label || slug).trim();
    if (BY_ID[id]) return `<span class="wikilink" onclick="go('article','${id}')">${lbl}</span>`;
    return `<span class="wikilink-dead">${lbl}</span>`;
  });
  text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return text;
}

function md(raw) {
  const lines = raw.split('\n');
  let html = '', buf = [], inUL = false, inOL = false;
  const flush = () => {
    if (!buf.length) return;
    const t = buf.join(' ').trim();
    if (t) html += `<p>${inline(t)}</p>`;
    buf = [];
  };
  const closeList = () => {
    if (inUL) { html += '</ul>'; inUL = false; }
    if (inOL) { html += '</ol>'; inOL = false; }
  };
  for (const line of lines) {
    if (/^## /.test(line)) { closeList(); flush(); html += `<h2>${inline(line.slice(3).trim())}</h2>`; }
    else if (/^### /.test(line)) { closeList(); flush(); html += `<h3>${inline(line.slice(4).trim())}</h3>`; }
    else if (/^- /.test(line)) {
      flush();
      if (!inUL) { closeList(); html += '<ul>'; inUL = true; }
      html += `<li>${inline(line.slice(2))}</li>`;
    } else if (/^\d+\. /.test(line)) {
      flush();
      if (!inOL) { closeList(); html += '<ol>'; inOL = true; }
      html += `<li>${inline(line.replace(/^\d+\. /, ''))}</li>`;
    } else if (!line.trim()) {
      closeList(); flush();
    } else {
      if (inUL || inOL) closeList();
      buf.push(line.trim());
    }
  }
  closeList(); flush();
  return html;
}

function viewSearch(q) {
  if (!q) return viewHome();
  const ql = q.toLowerCase();
  const hits = ARTICLES.filter(a =>
    a.title.toLowerCase().includes(ql) ||
    a.summary.toLowerCase().includes(ql) ||
    a.body.toLowerCase().includes(ql) ||
    a.blurb.toLowerCase().includes(ql)
  );
  if (!hits.length) return `<div class="empty">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <div class="empty-title">No results for "${q}"</div>
    <div class="empty-desc">Topics covered: schemas, Web SDK, segmentation, CJA, Profile, datastreams.</div></div>`;

  function snip(text) {
    const i = text.toLowerCase().indexOf(ql);
    if (i === -1) return text.slice(0, 130) + '…';
    const s = Math.max(0, i - 45), e = Math.min(text.length, i + ql.length + 90);
    return (s > 0 ? '…' : '') +
      text.slice(s, e).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<mark>${m}</mark>`) +
      (e < text.length ? '…' : '');
  }

  const items = hits.map(a => `
    <div class="sr-item" onclick="go('article','${a.id}')">
      <div class="sr-top">
        <span class="sr-title">${a.title}</span>
        <span class="sp sp-${a.status}">${a.status}</span>
      </div>
      <div class="sr-snip">${snip(a.summary + ' ' + a.body)}</div>
    </div>`).join('');

  return `<div class="sec-label" style="margin-bottom:16px">${hits.length} result${hits.length > 1 ? 's' : ''} for "${q}"</div>${items}`;
}

function go(view, id) {
  // Pills
  document.getElementById('pill-wiki').className  = 'nav-pill' + (view !== 'questions' ? ' active' : '');
  document.getElementById('pill-qs').className     = 'nav-pill' + (view === 'questions' ? ' active' : '');

  // Sidebar active state
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  if (view === 'home') document.getElementById('sl-home').classList.add('active');
  else if (view === 'questions') document.getElementById('sl-questions').classList.add('active');
  else if (view === 'article' && BY_ID[id]) {
    const el = document.getElementById('sl-' + id);
    if (el) el.classList.add('active');
  }

  // Clear search unless this IS a search
  if (view !== 'search') document.getElementById('search').value = '';

  // Render with fade
  const el = document.getElementById('content');
  el.style.opacity = 0;
  setTimeout(() => {
    let html = '';
    if (view === 'home')       html = viewHome();
    else if (view === 'article')   html = viewArticle(id);
    else if (view === 'search')    html = viewSearch(id);
    else if (view === 'questions') html = viewQuestions();
    el.innerHTML = html;
    el.style.opacity = 1;
    document.getElementById('main').scrollTop = 0;
  }, 100);
}
